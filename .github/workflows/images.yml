name: images

# Build and push the NanoClaw images to GHCR. Pure addition: nothing consumes
# these until Pan's deploy flow is rewired to pull them (devops-modernization
# spec, phase 2). Tags follow the release model: `pan-v*` tags are the deploy
# pins; branch pushes cover branch-pinned (unstable) environments; every push
# also gets an immutable sha tag.
#
# linux/amd64 only — every Pan Hetzner box is amd64 today. Add arm64 when a
# box shape demands it, not before (QEMU roughly doubles build time).

on:
  push:
    branches: [main]
    tags: ["pan-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: nanoclaw-host
            context: .
            dockerfile: Dockerfile
          - image: nanoclaw-agent
            context: ./container
            dockerfile: ./container/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
